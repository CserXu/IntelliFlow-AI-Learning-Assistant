<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IntelliFlow AI 学习助手</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(160deg, #eef2ff 0%, #f8fafc 100%); color: #0f172a; }
    .container { max-width: 1020px; margin: 32px auto; padding: 32px; background: #ffffff; border-radius: 28px; box-shadow: 0 30px 70px rgba(15, 23, 42, 0.08); }
    .header { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 18px; align-items: center; }
    .header h1 { margin: 0; font-size: 2.5rem; line-height: 1.1; }
    .header p { margin: 12px 0 0; color: #475569; max-width: 620px; }
    .grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 24px; margin-top: 30px; }
    .panel { background: #f8fbff; padding: 24px; border-radius: 24px; border: 1px solid #e2e8f0; }
    .panel h2 { margin-top: 0; font-size: 1.25rem; }
    .field { margin-bottom: 18px; }
    .field label { display: block; margin-bottom: 10px; font-weight: 700; color: #0f172a; }
    .field input { width: 100%; padding: 14px 16px; border-radius: 14px; border: 1px solid #cbd5e1; background: #ffffff; font-size: 1rem; color: #0f172a; }
    .button-row { margin-top: 12px; }
    button { width: 100%; padding: 15px 20px; border-radius: 16px; border: none; background: #2563eb; color: #ffffff; font-size: 1rem; font-weight: 700; cursor: pointer; transition: transform 0.2s ease, background 0.2s ease; }
    button:hover:not(:disabled) { background: #1d4ed8; transform: translateY(-1px); }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    .status { margin-top: 18px; color: #2563eb; font-weight: 700; }
    .note { margin-top: 14px; color: #64748b; font-size: 0.95rem; }
    .steps { display: grid; gap: 16px; }
    .step { display: grid; gap: 10px; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; background: #ffffff; }
    .step-title { display: flex; justify-content: space-between; align-items: center; font-weight: 700; }
    .step-description { color: #475569; line-height: 1.65; }
    .badge { padding: 5px 14px; border-radius: 999px; font-size: 0.86rem; font-weight: 700; }
    .badge.pending { background: #e2e8f0; color: #475569; }
    .badge.running { background: #dbeafe; color: #1d4ed8; }
    .badge.done { background: #dcfce7; color: #166534; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>IntelliFlow AI 学习助手</h1>
        <p>体验多 Agent 工作流：Planner、Researcher、Writer 协同生成你的学习路线。生成完成后会自动跳转到结果页查看 Markdown。</p>
      </div>
      <div class="note">填写学习目标、当前水平与周期，然后点击“生成学习路线”。</div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>输入学习目标</h2>
        <div class="field">
          <label for="goal">学习目标</label>
          <input id="goal" type="text" placeholder="例如：学习 Redis" />
        </div>
        <div class="field">
          <label for="level">当前水平</label>
          <input id="level" type="text" placeholder="例如：零基础" />
        </div>
        <div class="field">
          <label for="duration">学习周期</label>
          <input id="duration" type="text" placeholder="例如：2周" />
        </div>
        <div class="button-row">
          <button id="generateButton">生成学习路线</button>
        </div>
        <div id="status" class="status"></div>
      </div>

      <div class="panel">
        <h2>Agent Workflow 进度</h2>
        <div class="steps">
          <div class="step" id="step-planner">
            <div class="step-title">
              <span>Planner Agent</span>
              <span class="badge pending" id="badge-planner">Pending</span>
            </div>
            <div class="step-description">分析目标，拆解阶段、模块和执行步骤。</div>
          </div>
          <div class="step" id="step-researcher">
            <div class="step-title">
              <span>Researcher Agent</span>
              <span class="badge pending" id="badge-researcher">Pending</span>
            </div>
            <div class="step-description">搜索资料，整理推荐课程、官方文档与实践方向。</div>
          </div>
          <div class="step" id="step-writer">
            <div class="step-title">
              <span>Writer Agent</span>
              <span class="badge pending" id="badge-writer">Pending</span>
            </div>
            <div class="step-description">整合内容，生成结构化 Markdown 学习路线。</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const button = document.getElementById('generateButton');
    const statusEl = document.getElementById('status');
    const steps = ['planner', 'researcher', 'writer'];
    const timers = [];

    function updateStep(step, status) {
      const badge = document.getElementById(`badge-${step}`);
      if (!badge) return;
      badge.textContent = status.charAt(0).toUpperCase() + status.slice(1);
      badge.className = `badge ${status}`;
    }

    function resetWorkflow() {
      timers.forEach((timer) => clearTimeout(timer));
      timers.length = 0;
      steps.forEach((step) => updateStep(step, 'pending'));
    }

    function startWorkflowAnimation() {
      resetWorkflow();
      updateStep('planner', 'running');
      timers.push(setTimeout(() => {
        updateStep('planner', 'done');
        updateStep('researcher', 'running');
      }, 900));

      timers.push(setTimeout(() => {
        updateStep('researcher', 'done');
        updateStep('writer', 'running');
      }, 1900));
    }

    async function generatePlan() {
      const goal = document.getElementById('goal').value.trim();
      const level = document.getElementById('level').value.trim();
      const duration = document.getElementById('duration').value.trim();

      if (!goal || !level || !duration) {
        statusEl.textContent = '请填写所有字段。';
        return;
      }

      button.disabled = true;
      statusEl.textContent = '正在启动 Agent Workflow...';
      startWorkflowAnimation();

      try {
        const response = await fetch('/generate-plan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ goal, level, duration }),
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || '生成失败');
        }

        const data = await response.json();
        updateStep('writer', 'done');
        statusEl.textContent = '生成完成，正在跳转到结果页...';

        const resultData = {
          goal,
          planner_result: data.planner_result,
          researcher_result: data.researcher_result,
          final_markdown: data.final_markdown,
          output_file: data.output_file,
        };
        localStorage.setItem('intelliflow_result', JSON.stringify(resultData));
        setTimeout(() => {
          window.location.href = '/result';
        }, 600);
      } catch (error) {
        statusEl.textContent = '请求失败：' + (error.message || error);
        button.disabled = false;
      }
    }

    button.addEventListener('click', generatePlan);
  </script>
</body>
</html>
